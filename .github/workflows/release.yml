name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and upload binaries for (e.g. v4.2.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload-binaries:
    name: Upload Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          working-directory: extras/installer
          args: --config ../../.golangci.yml

      - name: Lint statusline
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          working-directory: extras/statusline
          args: --config ../../.golangci.yml

      - name: Test
        run: |
          cd extras/installer && go test -race -count=1 ./...
          cd ../../extras/statusline && go test -race -count=1 ./...

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2.9'
          args: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name || inputs.tag }}
