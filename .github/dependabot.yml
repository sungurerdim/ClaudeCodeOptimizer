version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/extras/installer"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/extras/statusline"
    schedule:
      interval: "weekly"
